services:
  web:
    build:
      context: .
      dockerfile: docker/control-plane/Dockerfile
    env_file: .env
    environment:
      PORT: 3000
      RUNNER_URL: http://worker:4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    restart: unless-stopped
    networks: [control]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    env_file: .env
    environment:
      WORKER_PORT: 4000
      PROJECT_WORKSPACES: /srv/sulayer/workspaces
      PROJECT_NETWORK: sulayer-projects
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - project_workspaces:/srv/sulayer/workspaces
      - build_cache:/var/lib/sulayer/cache
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [control]
    security_opt: [no-new-privileges:true]
    # The Docker socket is mounted only here. It is never mounted into project containers.

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sulayer
      POSTGRES_USER: sulayer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set-in-.env}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD-SHELL, pg_isready -U sulayer -d sulayer]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks: [control]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped
    networks: [control]

  reverse-proxy:
    image: caddy:2.8-alpine
    ports: ["80:80"]
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [web]
    restart: unless-stopped
    networks: [control]

networks:
  control:
    name: sulayer-control
  # Project workload network is created by the runner and is internal only.

volumes:
  postgres_data:
  redis_data:
  project_workspaces:
  build_cache:
  caddy_data:
  caddy_config:
